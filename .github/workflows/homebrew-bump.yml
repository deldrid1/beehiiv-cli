name: Homebrew Bump

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish to the Homebrew tap
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: homebrew-bump-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  bump:
    if: ${{ vars.HOMEBREW_TAP_REPOSITORY != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.tag }}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=${{ github.event.release.tag_name }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Update Homebrew tap
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          HOMEBREW_TAP_BRANCH: ${{ vars.HOMEBREW_TAP_BRANCH }}
          HOMEBREW_TAP_FORMULA_PATH: ${{ vars.HOMEBREW_TAP_FORMULA_PATH }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: ./scripts/update-homebrew-tap.sh
