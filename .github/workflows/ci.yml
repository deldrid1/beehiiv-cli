name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Lint
        run: make lint

      - name: Test
        run: go test ./...

      - name: Check generated artifacts
        run: ./scripts/check-generated.sh

  build-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build smoke binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-smoke
          binary="./dist-smoke/beehiiv"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            binary="${binary}.exe"
          fi
          go build -trimpath -o "${binary}" ./cmd/beehiiv
          "${binary}" --help >/dev/null
          "${binary}" version >/dev/null

  release-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run GoReleaser snapshot build
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --snapshot --clean

      - name: Smoke check release artifacts
        run: ./scripts/release-smoke.sh dist

      - name: Upload release-smoke artifacts
        uses: actions/upload-artifact@v7
        with:
          name: goreleaser-dist
          path: dist/*
